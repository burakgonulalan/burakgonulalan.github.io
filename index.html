<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burak Gönülalan | Kişisel Portfolyo</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            padding: 3rem;
            border: 1px solid #1e293b;
            border-radius: 24px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 { color: #38bdf8; font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; font-size: 1.2rem; line-height: 1.6; }
        .links { margin-top: 2rem; }
        .btn {
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Burak Gönülalan</h1>
        <p>Dijital Girişimci & Teknoloji Meraklısı</p>
        <p>İzmir'den dünyaya projeler üretiyor, MacBook Air M1 ile yeni ufuklara yelken açıyorum.</p>
        <div class="links">
            <a href="mailto:buraklopediofficial@gmail.com" class="btn">İletişime Geç</a>
        </div>
    </div>
</body>
</html>
