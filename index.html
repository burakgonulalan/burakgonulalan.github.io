<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURAK GÖNÜLALAN | APOCALYPSE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@900&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* Dinozor Arka Planı - Gerçekçi ve Korkutucu */
        #dino-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1517926967795-31943e805dae?auto=format&fit=crop&q=80&w=2000') no-repeat center center;
            background-size: cover;
            filter: brightness(0.4) contrast(1.2);
            z-index: 0;
            transform: scale(1.1);
        }

        .ui-content {
            position: relative;
            z-index: 20;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .wild-font { font-family: 'Permanent Marker', cursive; }
        
        .fire-text {
            color: #ff4d00;
            text-shadow: 0 0 20px #ff4d00, 5px 5px 0px #000;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; } 50% { opacity: 0.95; } 100% { opacity: 1; }
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .btn-interact { pointer-events: auto; cursor: pointer; transition: 0.2s; }
        .btn-interact:hover { transform: scale(1.1) rotate(3deg); filter: hue-rotate(90deg); }
    </style>
</head>
<body>

    <div id="dino-bg"></div>
    <div id="canvas-container"></div>

    <div class="ui-content text-center">
        <h1 class="wild-font text-7xl md:text-9xl fire-text mb-4">BURAK GÖNÜLALAN</h1>
        
        <div class="btn-interact bg-red-700 text-white border-8 border-black p-4 mb-8 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
            <p class="text-xl md:text-3xl font-black uppercase tracking-tighter">
                Professional Developer | Jurassic Tech
            </p>
        </div>

        <div class="flex gap-4 btn-interact">
            <a href="mailto:burakgonulalan@email.com" class="bg-yellow-500 text-black font-black px-8 py-4 text-xl border-4 border-black hover:bg-white">MAIL AT</a>
            <a href="https://github.com/burakgonulalann" target="_blank" class="bg-white text-black font-black px-8 py-4 text-xl border-4 border-black hover:bg-yellow-500">GITHUB</a>
        </div>

        <p class="mt-10 text-white font-bold tracking-widest animate-bounce">EKRANA TIKLA: KÜKREME VE ÇARPIŞMAYI BAŞLAT!</p>
    </div>

    <script>
        let scene, camera, renderer, rocks = [];
        let audioCtx, roarBuffer, impactBuffer;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Işıklar
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const redLight = new THREE.PointLight(0xff0000, 2, 50);
            redLight.position.set(0, 0, 10);
            scene.add(redLight);

            // Gerçekçi 3 Boyutlu Kayalar
            const rockGeo = new THREE.DodecahedronGeometry(2, 1);
            const rockMat = new THREE.MeshStandardMaterial({ 
                color: 0x444444, 
                roughness: 1, 
                metalness: 0,
                flatShading: true 
            });

            for(let i=0; i<6; i++) {
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 10
                );
                rock.userData = { 
                    vel: new THREE.Vector3((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.1),
                    rot: new THREE.Vector3(Math.random()*0.02, Math.random()*0.02, 0)
                };
                rocks.push(rock);
                scene.add(rock);
            }

            // Mouse Takibi (3D Parallax için)
            window.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 2;
                const y = (e.clientY / window.innerHeight - 0.5) * 2;
                camera.position.x += (x - camera.position.x) * 0.05;
                camera.position.y += (-y - camera.position.y) * 0.05;
                document.getElementById('dino-bg').style.transform = `scale(1.1) translate(${x*20}px, ${y*20}px)`;
            });

            loadSounds();
            animate();
        }

        async function loadSounds() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Gerçek Dinozor Kükremesi (Placeholder URL - Kendi dosyanı ekleyebilirsin)
            const roarRes = await fetch('https://actions.google.com/sounds/v1/science_fiction/low_vibe.ogg'); // Derin kükreme benzeri ses
            const impactRes = await fetch('https://actions.google.com/sounds/v1/impacts/crash_metal.ogg');
            
            const roarData = await roarRes.arrayBuffer();
            const impactData = await impactRes.arrayBuffer();
            
            roarBuffer = await audioCtx.decodeAudioBuffer(roarData);
            impactBuffer = await audioCtx.decodeAudioBuffer(impactData);
        }

        function playRoar() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const source = audioCtx.createBufferSource();
            source.buffer = roarBuffer;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.8;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start(0);
        }

        function playImpact() {
            const source = audioCtx.createBufferSource();
            source.buffer = impactBuffer;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.4;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start(0);
        }

        function animate() {
            requestAnimationFrame(animate);

            rocks.forEach((rock, i) => {
                rock.position.add(rock.userData.vel);
                rock.rotation.x += rock.userData.rot.x;
                rock.rotation.y += rock.userData.rot.y;

                // Sekme ve Çarpışma
                if(Math.abs(rock.position.x) > 20) rock.userData.vel.x *= -1;
                if(Math.abs(rock.position.y) > 15) rock.userData.vel.y *= -1;

                rocks.forEach((other, j) => {
                    if(i === j) return;
                    if(rock.position.distanceTo(other.position) < 4) {
                        rock.userData.vel.multiplyScalar(-1.1); // Çarpışınca hızlan
                        if(Math.random() > 0.8) playImpact();
                    }
                });
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('click', () => {
            playRoar();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
