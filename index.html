<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURAK GONULALAN | AGGRESSIVE_CORE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --red: #ff0000; --blue: #00f2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: #000; color: #fff; overflow: hidden; font-family: 'Orbitron', sans-serif; }

        /* Nişangah İmleç */
        #crosshair {
            width: 40px; height: 40px;
            border: 1px solid var(--red);
            position: fixed; pointer-events: none;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        #crosshair::after { content: ''; width: 4px; height: 4px; background: var(--red); border-radius: 50%; }

        /* ANA BAŞLIK: AMCIK */
        .main-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
        }

        .aggressive-title {
            font-size: clamp(5rem, 30vw, 18rem); /* Devasa Başlık */
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -5px;
            position: relative;
            text-shadow: 0.05em 0 0 var(--red), -0.025em -0.05em 0 var(--blue);
            animation: glitch 0.4s infinite;
            user-select: none;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* Köşe Bilgileri */
        .corner-ui {
            position: fixed;
            padding: 30px;
            z-index: 100;
            font-family: 'Syncopate', sans-serif;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; border-left: 2px solid var(--red); }
        .bottom-right { bottom: 0; right: 0; border-right: 2px solid var(--blue); text-align: right; }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 500; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div class="scanlines"></div>

    <div class="corner-ui top-left">
        <h2 class="text-xs tracking-[0.5em] text-red-600">OPERATOR_IDENTIFIED</h2>
        <p class="text-xl font-bold">BURAK GONULALAN</p>
        <p class="text-[10px] text-gray-500">UNIT: OGG_IZMIR_026</p>
    </div>

    <div class="corner-ui bottom-right">
        <h2 class="text-xs tracking-[0.5em] text-cyan-400">SYSTEM_OVERRIDE</h2>
        <p class="text-xl font-bold">STATUS: TERMINAL</p>
        <a href="https://github.com/burakgonulalann" class="text-[10px] text-red-600 pointer-events-auto hover:underline italic">GITHUB_LOGIN_ACCESS</a>
    </div>

    <div class="main-container" onclick="roarEffect()">
        <h1 id="target-word" class="aggressive-title">AMCIK</h1>
    </div>

    <script>
        let audioCtx;

        // Gerçek Zamanlı Dinozor Kükremesi Sentezleyici
        function roarEffect() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const duration = 2;
            const osc = audioCtx.createOscillator();
            const noise = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + duration);

            noise.type = 'square';
            noise.frequency.setValueAtTime(150, audioCtx.currentTime);
            noise.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + duration);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + duration);

            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.connect(filter);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(); noise.start();
            osc.stop(audioCtx.currentTime + duration);
            noise.stop(audioCtx.currentTime + duration);

            // Tıklama anında ekran sarsıntısı
            gsap.fromTo(".main-container", { x: 20 }, { x: 0, duration: 0.1, repeat: 5, yoyo: true });
        }

        // Fare Takibi (Nişangah ve Parallax)
        window.addEventListener('mousemove', (e) => {
            gsap.to("#crosshair", { x: e.clientX - 20, y: e.clientY - 20, duration: 0.1 });
            
            const xPos = (e.clientX / window.innerWidth - 0.5) * 50;
            const yPos = (e.clientY / window.innerHeight - 0.5) * 50;
            
            gsap.to("#target-word", { 
                x: xPos, 
                y: yPos, 
                rotationX: -yPos / 2, 
                rotationY: xPos / 2, 
                duration: 0.5 
            });
        });

        // Sayfa tıklandığında kükremeyi tetikle
        window.addEventListener('mousedown', roarEffect);
    </script>
</body>
</html>
