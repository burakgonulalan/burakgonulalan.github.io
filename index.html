<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURAK GÖNÜLALAN | DINO-REVOLUTION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;900&display=swap" rel="stylesheet">

    <style>
        /* 1. Animasyonlu Cıvıl Cıvıl Arka Plan */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Neon Yazı Efektleri */
        .bungee-font { font-family: 'Bungee', cursive; }
        .neon-text {
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff00de, 0 0 40px #ff00de;
        }

        /* 3. 3D Alanı ve UI Katmanları */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Taşlar ve Dino arkada */
        }

        .ui-wrapper {
            position: relative;
            z-index: 10; /* Yazılar ve butonlar önde */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Mouse hareketleri arkadaki 3D'ye geçsin diye */
        }

        .interactive-element { pointer-events: auto; } /* Sadece butonlar tıklanabilir */

        /* Buton Sallanma Efekti */
        .wiggle:hover {
            animation: wiggle 0.3s infinite;
        }
        @keyframes wiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-3deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-wrapper text-center px-4">
        
        <h1 class="bungee-font text-6xl md:text-9xl mb-4 neon-text animate-pulse">
            BURAK GÖNÜLALAN
        </h1>

        <div class="interactive-element bg-black/40 backdrop-blur-xl border-4 border-yellow-400 p-6 rounded-3xl mb-8 transform -rotate-2 hover:rotate-0 transition-transform shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
            <p class="text-2xl md:text-4xl font-black italic tracking-wider text-yellow-400">
                DINO-POWER & PROFESSIONAL DEV
            </p>
        </div>

        <div class="interactive-element flex flex-wrap gap-6 justify-center mt-4">
            <a href="mailto:burakgonulalan@email.com" class="wiggle bg-pink-600 hover:bg-pink-400 text-white border-4 border-black px-8 py-4 rounded-xl text-2xl font-black shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] transition-all">
                BANA YAZ! 📧
            </a>
            
            <a href="https://github.com/burakgonulalann" target="_blank" class="wiggle bg-blue-600 hover:bg-blue-400 text-white border-4 border-black px-8 py-4 rounded-xl text-2xl font-black shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] transition-all">
                KODLAR BURADA! 💻
            </a>
        </div>

        <p class="mt-12 text-black font-bold bg-white/80 px-4 py-1 rounded-full animate-bounce interactive-element">
            Dinozoru ve Kayaları Görmek/Duymak İçin Ekrana Tıkla!
        </p>
    </div>

    <script>
        let scene, camera, renderer, dino, rocks = [];
        let audioCtx;

        function init3D() {
            // SAHNE AYARI
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // IŞIKLANDIRMA (Cıvıl cıvıl olması için renkli ışıklar)
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            const purpleLight = new THREE.PointLight(0xff00ff, 2);
            purpleLight.position.set(-10, 5, 5);
            scene.add(purpleLight);

            // 3D DINOZOR (Soyut T-Rex Modeli)
            const dinoGroup = new THREE.Group();
            
            // Gövde
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(4, 2, 2.5),
                new THREE.MeshStandardMaterial({ color: 0x32CD32, roughness: 0.1, metalness: 0.5 })
            );
            dinoGroup.add(body);

            // Kafa
            const head = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1.8, 1.8),
                new THREE.MeshStandardMaterial({ color: 0x228B22 })
            );
            head.position.set(2.5, 1.5, 0);
            dinoGroup.add(head);

            // Kuyruk
            const tail = new THREE.Mesh(
                new THREE.ConeGeometry(1, 4, 4),
                new THREE.MeshStandardMaterial({ color: 0x32CD32 })
            );
            tail.rotation.z = Math.PI / 2;
            tail.position.set(-3, 0, 0);
            dinoGroup.add(tail);

            dino = dinoGroup;
            scene.add(dino);

            // VURUŞAN KAYALAR
            const rockGeo = new THREE.IcosahedronGeometry(1.5, 0);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x555555, flatShading: true });

            for(let i=0; i<4; i++) {
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 5
                );
                rock.userData = { 
                    velocity: new THREE.Vector3((Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1, 0) 
                };
                rocks.push(rock);
                scene.add(rock);
            }

            animate();
        }

        // SES MOTORU (Web Audio API)
        function triggerMagic() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // 1. Giriş Müziği (Deep Bass)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(40, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);

            // 2. Kaya Vurma Sesi (Patlama efekti)
            const noise = audioCtx.createOscillator();
            const noiseGain = audioCtx.createGain();
            noise.type = 'triangle';
            noise.frequency.setValueAtTime(150, audioCtx.currentTime);
            noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            noise.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.3);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Dinozor Hareketleri
            dino.rotation.y += 0.02;
            dino.position.y = Math.sin(Date.now() * 0.002) * 1.5;
            dino.rotation.z = Math.sin(Date.now() * 0.001) * 0.1;

            // Kaya Hareketleri ve Çarpışma Mantığı
            rocks.forEach((rock, idx) => {
                rock.position.add(rock.userData.velocity);
                rock.rotation.x += 0.01;

                // Kenarlardan Sekme
                if(Math.abs(rock.position.x) > 15) rock.userData.velocity.x *= -1;
                if(Math.abs(rock.position.y) > 10) rock.userData.velocity.y *= -1;

                // Diğer kayalarla çarpışma kontrolü
                rocks.forEach((other, oIdx) => {
                    if(idx === oIdx) return;
                    if(rock.position.distanceTo(other.position) < 3) {
                        rock.userData.velocity.multiplyScalar(-1);
                        other.userData.velocity.multiplyScalar(-1);
                    }
                });
            });

            renderer.render(scene, camera);
        }

        // Pencere Boyutu Değişince Düzenle
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // İLK TIKLAMA İLE BAŞLAT
        window.addEventListener('click', () => {
            triggerMagic();
        });

        init3D();
    </script>
</body>
</html>
