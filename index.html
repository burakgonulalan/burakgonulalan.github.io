<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURAK GÖNÜLALAN | THE JURASSIC WORLD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* Dinozor Arka Planı */
        #bg-dino {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1559963110-71b394e7494d?q=80&w=2000') no-repeat center center;
            background-size: cover;
            filter: brightness(0.3) saturate(1.5);
            z-index: -2;
            transition: transform 0.1s ease-out;
        }

        /* Vahşi Başlık */
        .wild-title {
            font-family: 'Permanent Marker', cursive;
            font-size: clamp(3rem, 10vw, 8rem);
            color: #ff3e00;
            text-shadow: 0 0 20px rgba(255, 62, 0, 0.8), 4px 4px 0 #000;
            letter-spacing: -2px;
        }

        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; }
        
        .overlay {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.7) 100%);
        }

        .btn-box {
            background: #ff3e00;
            color: black;
            font-weight: 900;
            padding: 15px 40px;
            border: 4px solid black;
            box-shadow: 8px 8px 0 #fff;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.1s;
        }

        .btn-box:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0 #fff; }
    </style>
</head>
<body>

    <div id="bg-dino"></div>
    <div id="canvas-container"></div>

    <div class="overlay">
        <h1 class="wild-title animate-pulse">BURAK GÖNÜLALAN</h1>
        
        <div class="my-8 space-y-4">
            <p class="text-2xl font-black bg-white text-black px-4 py-2 skew-x-[-10deg]">
                PROFESYONEL ÖGG & YAZILIM GELİŞTİRİCİ
            </p>
        </div>

        <div class="flex gap-4 mb-12">
            <button onclick="window.location.href='mailto:burakgonulalan@email.com'" class="btn-box">BANA YAZ</button>
            <button onclick="window.open('https://github.com/burakgonulalann', '_blank')" class="btn-box" style="background:#fff">GITHUB</button>
        </div>

        <p id="status" class="text-yellow-400 font-bold uppercase tracking-widest text-sm animate-bounce">
            SES VE 3D İÇİN EKRANA SERTÇE TIKLA!
        </p>
    </div>

    <script>
        // --- 3D DÜNYASI ---
        let scene, camera, renderer, rocks = [];
        
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Işıklar
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const pointLight = new THREE.PointLight(0xff3e00, 2, 50);
            pointLight.position.set(5, 5, 10);
            scene.add(pointLight);

            // Devasa 3D Kayalar
            const geometry = new THREE.DodecahedronGeometry(2, 0);
            const material = new THREE.MeshStandardMaterial({ color: 0x444444, flatShading: true });

            for(let i=0; i<5; i++) {
                const rock = new THREE.Mesh(geometry, material);
                rock.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*15, (Math.random()-0.5)*5);
                rock.velocity = new THREE.Vector3((Math.random()-0.5)*0.15, (Math.random()-0.5)*0.15, 0);
                rocks.push(rock);
                scene.add(rock);
            }

            animate();
        }

        // --- SES MOTORU (Hatasız) ---
        let audioCtx;
        function playEpicSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // 1. Kükreme Sentezleyici (Dosya gerektirmez, kodla üretir)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.5);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);

            document.getElementById('status').innerText = "KÜKREME AKTİF!";
        }

        // --- ANİMASYON DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);
            rocks.forEach(rock => {
                rock.position.add(rock.velocity);
                rock.rotation.x += 0.01; rock.rotation.y += 0.01;
                
                if(Math.abs(rock.position.x) > 18) rock.velocity.x *= -1;
                if(Math.abs(rock.position.y) > 10) rock.velocity.y *= -1;
            });
            renderer.render(scene, camera);
        }

        // --- ETKİLEŞİM ---
        window.addEventListener('click', () => {
            playEpicSound();
        });

        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            document.getElementById('bg-dino').style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
    </script>
</body>
</html>
