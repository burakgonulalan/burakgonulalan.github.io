!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burak Gönülalan | 3D Dijital Evren</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --neon-pink: #ff00ff;
            --neon-purple: #9d00ff;
            --bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Cam Kart Tasarımı - Ultra Parlak */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 40px;
            padding: 4rem 2rem;
            max-width: 850px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 80px rgba(157, 0, 255, 0.3), inset 0 0 20px rgba(0, 242, 254, 0.2);
            position: relative;
            z-index: 10;
        }

        h1 { 
            font-size: 4rem; 
            font-weight: 900; 
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary), var(--neon-pink), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }
        
        .sub-title { 
            font-size: 1.5rem; 
            color: var(--primary); 
            font-weight: 600;
            margin-bottom: 2rem; 
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--primary);
        }

        .info-item { 
            background: rgba(157, 0, 255, 0.1);
            border: 1px solid var(--neon-purple);
            padding: 15px 30px; 
            border-radius: 50px; 
            font-weight: 600;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.4);
        }

        .btn-mail {
            background: linear-gradient(45deg, var(--neon-purple), var(--secondary));
            padding: 20px 50px;
            font-size: 1.3rem;
            box-shadow: 0 0 50px var(--neon-purple);
        }

        .btn-mail:hover { box-shadow: 0 0 70px var(--primary); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="glass-card">
        <h1>Burak Gönülalan</h1>
        <div class="sub-title">3D DIGITAL MASTER</div>

        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px;">
            <div class="info-item">İZMİR</div>
            <div class="info-item">11.12.1994</div>
            <div class="info-item">8 YIL TECRÜBE</div>
        </div>

        <p style="font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; color: #ccc;">
            Dijital dünyanın kalbinde, İzmir'in enerjisiyle beslenen 8 yıllık bir vizyon. 
            Algoritmaları yöneten, geleceği 3D perspektifle inşa eden bir stratejist.
        </p>
        
        <a href="mailto:buraklopediofficial@gmail.com" class="btn-mail" style="color: white; text-decoration: none; border-radius: 50px; font-weight: 900;">
            BAĞLANTI KUR
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Cıvıl Cıvıl 3D Yıldız/Parçacık Efekti
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const colors = [];
            for (let i = 0; i < 5000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(50), THREE.MathUtils.randFloatSpread(50), THREE.MathUtils.randFloatSpread(50));
                const color = new THREE.Color();
                color.setHSL(Math.random(), 0.7, 0.5); // Her parçacık farklı renk
                colors.push(color.r, color.g, color.b);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.x += 0.001;
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
